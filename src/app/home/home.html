<main class="p-6 dark:bg-gray-700">
  <ul class="grid grid-cols-2 md:grid-cols-3 gap-6">
    @for (p of products$ | async; track p.id) {
      <li class="border p-4 rounded-lg flex flex-col shadow-sm">
        <img [src]="p.image" class="h-32 object-contain my-2">
        <h4 class="font-bold text-sm h-12 text-center">{{p.title}}</h4>
        <h5 class="font-medium text-md text-center text-lime-500 ">{{p.price | currency}}</h5>
        <button 
          (click)="buyItem(p)" 
          class="bg-green-600 text-white p-2 rounded mt-2 hover:bg-green-700">
          {{'addCart' | translate}}
          <i class="fa-solid fa-cart-arrow-down"></i>
        </button>
      </li>
    }
  </ul>
</main>
