<div class="p-6">
  <h2 class="text-2xl font-bold mb-4">Your Shopping Cart</h2>
  
  <div class="space-y-4">
    @for (item of (api.cart$ | async); track item.id) {
      <div class="flex items-center justify-between border-b pb-4">
        <div class="flex items-center gap-4">
          <input type="checkbox" [checked]="item.selected" (change)="api.toggleSelect(item.id)" class="w-5 h-5 border-lime-700 outline-lime-700 accent-lime-700">
          <img [src]="item.image" class="w-16 h-16 object-contain">
          <div>
            <p class="font-semibold">{{ item.title }}</p>
            <p>${{ item.price  | number:'1.2-2'}}</p>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button (click)="api.updateQuantity(item.id, -1)" class="px-2 border rounded">-</button>
          <span>{{ item.quantity }}</span>
          <button (click)="api.updateQuantity(item.id, 1)" class="px-2 border rounded">+</button>
        </div>
      </div>
    }
  </div>

  <button 
    (click)="api.placeOrder()" 
    class="mt-6 w-full bg-orange-500 text-white font-bold py-3 rounded-lg hover:bg-orange-600">
    Place Order
  </button>
</div>
