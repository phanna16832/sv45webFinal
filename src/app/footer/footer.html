<footer class="bg-white border-t border-gray-200 py-10 px-4">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-8">
 <div>
      <h5 class="font-bold uppercase mb-4 text-sm tracking-wider">Orders</h5>
      <ul class="space-y-3">
        <li>
          <a routerLink="orders" class="flex items-center gap-3 text-gray-600 hover:text-lime-600 transition-colors text-sm">
            <i class="fa-solid fa-bag-shopping w-5"></i>
            <span>My Orders</span>
          </a>
        </li>
      </ul>
    </div>

    <div>
      <h5 class="font-bold uppercase mb-4 text-sm tracking-wider">{{'footer.social'}}</h5>
      <ul class="space-y-3">
        @for (i of icons; track $index) {
          <li>
            <a href="#" class="flex items-center gap-3 text-gray-600 hover:text-lime-600 transition-colors text-sm">
              <i class="{{i}} w-5 flex justify-center text-base"></i>
              <span class="capitalize">{{i.split('-').pop()}}</span>
            </a>
          </li>
        }
      </ul>
    </div>

    <div>
      <h5 class="font-bold uppercase mb-4 text-sm tracking-wider">Contact Us</h5>
      <div class="flex flex-col space-y-3">
        <a href="mailto:setec-sv45WdIII.co" class="flex items-center gap-3 text-gray-600 hover:text-.lime text-sm">
          <i class="fa-solid fa-envelope w-5 text-center"></i>
          <span>setec-sv45WdIII.co</span>
        </a>
        <a href="#" class="flex items-center gap-3 text-gray-600 hover:text-lime-400 text-sm">
          <i class="fa-brands fa-telegram w-5 text-center"></i>
          <span>Telegram</span>
        </a>
      </div>
    </div>

  </div>

  <div class="max-w-6xl mx-auto mt-10 pt-6 border-t border-gray-100 text-right">
    <p class="text-xs text-gray-500">&copy; {{year}}. All rights reserved.</p>
  </div>
</footer>
